name: Auto Release and Publish

on:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write

jobs:
  auto-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check commit message and release
        id: check
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          echo "Commit message: $COMMIT_MSG"

          # Skip version bump commits (pushed by this workflow) to prevent loops
          if [[ "$COMMIT_MSG" == Bump\ version:* ]]; then
            echo "Skipping â€” version bump commit from this workflow"
            echo "should_release=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Publish current pyproject version as-is (no semver bump). Use for first release at X.Y.Z.
          if [[ $COMMIT_MSG =~ ^release:[[:space:]]*(.+)$ ]]; then
            echo "Release (no bump): ${BASH_REMATCH[1]}"
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "release_mode=publish_only" >> $GITHUB_OUTPUT
            echo "release_notes=${BASH_REMATCH[1]}" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [[ $COMMIT_MSG =~ ^(patch|minor|major):[[:space:]]*(.+)$ ]]; then
            TYPE="${BASH_REMATCH[1]}"
            NOTES="${BASH_REMATCH[2]}"
            echo "Release with bump: $TYPE â€” $NOTES"
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "release_mode=bump" >> $GITHUB_OUTPUT
            echo "release_type=$TYPE" >> $GITHUB_OUTPUT
            echo "release_notes=$NOTES" >> $GITHUB_OUTPUT
          else
            echo "Not a release commit â€” skipping"
            echo "should_release=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Python
        if: steps.check.outputs.should_release == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Bump version, tag, and push (semver)
        if: steps.check.outputs.should_release == 'true' && steps.check.outputs.release_mode == 'bump'
        id: bump
        run: |
          TYPE="${{ steps.check.outputs.release_type }}"

          CURRENT_VERSION=$(python -c "import re; print(re.search(r'version = \"(.+?)\"', open('pyproject.toml').read()).group(1))")
          echo "Current version: $CURRENT_VERSION"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"

          case $TYPE in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "New version: $NEW_VERSION"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

          sed -i "s/__version__ = \".*\"/__version__ = \"$NEW_VERSION\"/" src/gravixlayer/__init__.py
          sed -i "/^\[project\]/,/^\[/{s/^version = \".*\"/version = \"$NEW_VERSION\"/}" pyproject.toml

          if grep -q '^__version__' version.py 2>/dev/null; then
            sed -i "s/^__version__ = \".*\"/__version__ = \"$NEW_VERSION\"/" version.py
          fi

          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"

          git add src/gravixlayer/__init__.py pyproject.toml
          if [[ -f version.py ]]; then git add version.py; fi
          git commit -m "Bump version: $CURRENT_VERSION -> $NEW_VERSION"

          git tag -d "v$NEW_VERSION" 2>/dev/null || true
          git push origin --delete "v$NEW_VERSION" 2>/dev/null || true

          git tag "v$NEW_VERSION"

          git pull --rebase origin main || true
          git push origin main
          git push origin "v$NEW_VERSION"

      - name: Tag current version (no bump)
        if: steps.check.outputs.should_release == 'true' && steps.check.outputs.release_mode == 'publish_only'
        id: publish_only
        run: |
          CURRENT_VERSION=$(python -c "import re; print(re.search(r'version = \"(.+?)\"', open('pyproject.toml').read()).group(1))")
          echo "Publishing version from pyproject: $CURRENT_VERSION"
          echo "new_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"

          git tag -d "v$CURRENT_VERSION" 2>/dev/null || true
          git push origin --delete "v$CURRENT_VERSION" 2>/dev/null || true

          git tag "v$CURRENT_VERSION"
          git push origin "v$CURRENT_VERSION"

      - name: Install build tools
        if: steps.check.outputs.should_release == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package
        if: steps.check.outputs.should_release == 'true'
        run: python -m build

      - name: Publish to PyPI
        if: steps.check.outputs.should_release == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}
          skip-existing: true
          verbose: true
          attestations: false

      - name: Create GitHub Release
        if: steps.check.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.new_version || steps.publish_only.outputs.new_version }}
          name: Release v${{ steps.bump.outputs.new_version || steps.publish_only.outputs.new_version }}
          body: ${{ steps.check.outputs.release_notes }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
